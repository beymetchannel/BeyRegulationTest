<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ベイブレードX レギュレーション検定</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --arena-black:#0A0E16;
    --panel:#141B26;
    --panel-2:#1B2433;
    --line:#26324433;
    --cyan:#29E6FF;
    --orange:#FF7A28;
    --chrome:#EDF2F7;
    --slate:#7587A0;
    --alert:#FF4D5E;
    --gold:#FFC93C;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}

  body{
    background: radial-gradient(ellipse 900px 500px at 50% -10%, #15233a 0%, transparent 60%), var(--arena-black);
    color:var(--chrome);
    font-family:'Noto Sans JP', sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:32px 16px 80px;
  }

  .mono{font-family:'JetBrains Mono', monospace;}

  .app-shell{ width:100%; max-width:640px; }

  /* ---------- HERO ---------- */
  .hero{
    position:relative; overflow:hidden; border-radius:4px;
    padding:36px 28px 30px; margin-bottom:18px;
    background:linear-gradient(180deg, #121826 0%, #0D131F 100%);
    border:1px solid #1F2A3C;
  }
  .eyebrow{ font-size:11px; letter-spacing:.16em; color:var(--cyan); text-transform:uppercase; margin-bottom:10px; position:relative; z-index:1; }
  .hero h1{
    font-family:'Rajdhani', sans-serif; font-weight:700; font-style:italic; font-size:40px;
    line-height:1; margin:0 0 4px; letter-spacing:.01em; transform:skewX(-4deg); transform-origin:left; position:relative; z-index:1;
  }
  .hero h1 span{color:var(--orange);}
  .hero p{ margin:10px 0 0; font-size:13.5px; color:var(--slate); line-height:1.6; max-width:420px; position:relative; z-index:1; }

  /* ---------- BUTTONS ---------- */
  .blade-btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    background:var(--orange); color:#0A0E16; border:none;
    font-family:'Rajdhani', sans-serif; font-weight:700; font-size:16px; letter-spacing:.02em;
    padding:13px 26px; cursor:pointer;
    clip-path:polygon(4% 0, 100% 0, 96% 100%, 0% 100%);
    transition:filter .15s ease, transform .15s ease;
  }
  .blade-btn:hover:not(:disabled){filter:brightness(1.1);}
  .blade-btn:active:not(:disabled){transform:translateY(1px);}
  .blade-btn:disabled{background:#354154; color:#7587A0; cursor:not-allowed;}
  .blade-btn.ghost{ background:transparent; color:var(--chrome); border:1px solid #2A3850; }
  .blade-btn.ghost:hover{ border-color:var(--cyan); color:var(--cyan); }
  .blade-btn.action{ background:var(--cyan); color:#0A0E16; width:100%; margin-top:16px; }

  /* ---------- PROGRESS ---------- */
  .progress-row{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .progress-label{ font-size:12px; color:var(--slate); letter-spacing:.05em; }
  .progress-label b{color:var(--chrome);}
  .progress-ticks{ display:flex; gap:2px; margin-bottom:20px; flex-wrap:wrap; }
  .tick{ height:3px; flex:1 1 calc(10% - 2px); min-width:4px; background:#222C3D; border-radius:1px; transition:background .25s ease; }
  .tick.done{background:var(--cyan);}
  .tick.current{background:var(--orange);}

  /* ---------- QUIZ CARD ---------- */
  .card{
    background:var(--panel); border:1px solid #1F2A3C;
    clip-path:polygon(0 14px, 14px 0, 100% 0, 100% calc(100% - 14px), calc(100% - 14px) 100%, 0 100%);
    padding:26px 26px 24px; position:relative; min-height:280px;
  }
  .q-badge{ display:inline-block; font-size:10px; font-weight:700; background:#2A3850; color:var(--cyan); padding:3px 8px; border-radius:2px; margin-bottom:10px; letter-spacing:0.05em; }
  .q-badge.multi{ background:#4A2E14; color:var(--orange); }
  .q-text{ font-family:'Rajdhani', sans-serif; font-weight:600; font-size:18px; line-height:1.5; margin:0 0 22px; color:var(--chrome); }

  .options{ display:flex; flex-direction:column; gap:10px; }
  .opt{
    display:flex; align-items:center; gap:14px; width:100%; text-align:left;
    background:var(--panel-2); border:1px solid #283248; color:var(--chrome);
    font-family:'Noto Sans JP', sans-serif; font-size:14px; padding:13px 14px;
    cursor:pointer; border-radius:3px; transition:all .15s ease;
  }
  .opt:hover:not(.locked){ border-color:var(--cyan); }
  .opt.selected{ border-color:var(--orange); background:#2A1F18; }
  .opt.selected .opt-tag{ background:var(--orange); color:#0A0E16; border-color:var(--orange); }
  
  .opt-tag{
    font-family:'JetBrains Mono', monospace; font-size:12px; color:var(--slate);
    width:22px; height:22px; border:1px solid #354154; border-radius:3px;
    display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all .15s ease;
  }
  .opt.correct{ border-color:var(--cyan); background:#102733; }
  .opt.correct .opt-tag{ background:var(--cyan); color:#08121A; border-color:var(--cyan); }
  .opt.wrong{ border-color:var(--alert); background:#2A1318; }
  .opt.wrong .opt-tag{ background:var(--alert); color:#0A0E16; border-color:var(--alert); }
  .opt.missed{ border-color:var(--gold); border-style:dashed; } /* Should have been selected */
  .opt.locked{ cursor:default; }
  .opt.dim{ opacity:.45; }

  .explain{ margin-top:18px; padding-top:16px; border-top:1px dashed #283248; font-size:13px; line-height:1.7; color:var(--slate); display:none; }
  .explain b{color:var(--chrome);}

  .feedback-row{ display:none; align-items:center; justify-content:space-between; margin-top:20px; }
  .point-badge{ display:inline-flex; flex-direction:column; align-items:center; line-height:1; padding:9px 18px; clip-path:polygon(10% 0, 100% 0, 90% 100%, 0% 100%); font-family:'Rajdhani', sans-serif; }
  .point-badge .pt{font-size:20px; font-weight:700;}
  .point-badge .ft{font-family:'JetBrains Mono', monospace; font-size:9px; letter-spacing:.08em; margin-top:2px;}
  .badge-spin{background:#22384A; color:var(--cyan);}
  .badge-over{background:#1C4255; color:var(--cyan);}
  .badge-burst{background:#4A2E14; color:var(--orange);}
  .badge-extreme{background:#4A3A0E; color:var(--gold);}
  .badge-miss{background:#3A1A1F; color:var(--alert);}

  .next-wrap{display:flex; justify-content:flex-end; margin-top:22px;}

  /* ---------- RESULT ---------- */
  .result-card{ background:var(--panel); border:1px solid #1F2A3C; clip-path:polygon(0 14px, 14px 0, 100% 0, 100% calc(100% - 14px), calc(100% - 14px) 100%, 0 100%); padding:36px 28px; text-align:center; }
  .result-score{ font-family:'Rajdhani', sans-serif; font-weight:700; font-size:56px; margin:8px 0 2px; color:var(--chrome); }
  .result-score span{color:var(--slate); font-size:24px;}
  .result-rank{ font-family:'Rajdhani', sans-serif; font-weight:700; font-style:italic; font-size:26px; margin:14px 0 6px; transform:skewX(-3deg); }
  .ring-wrap{margin:18px auto 8px; width:140px; height:140px;}
  .hidden{display:none !important;}
</style>
</head>
<body>
<div class="app-shell">

  <div class="hero">
    <div class="eyebrow mono">version 1.9</div>
    <h1>ベイブレード<span>X</span> 検定 <small style="font-size:20px;">[100問]</small></h1>
    <p>当問題はレギュレーション第12版を元に生成されています。</p>
    <p></p>
    <div class="start-btn">
      <button class="blade-btn" id="startBtn">検定をはじめる ▸</button>
    </div>
  </div>

  <div id="quizView" class="hidden">
    <div class="progress-row">
      <div class="progress-label mono">QUESTION <b id="qNumLabel">01</b> / <span id="qTotalLabel">100</span></div>
      <div class="progress-label mono" id="scoreLabel">SCORE <b>0</b> PT</div>
    </div>
    <div class="progress-ticks" id="ticks"></div>

    <div class="card">
      <div id="qBadge" class="q-badge">SINGLE SELECT</div>
      <p class="q-text" id="qText"></p>
      <div class="options" id="options"></div>
      
      <button class="blade-btn action hidden" id="submitBtn" disabled>回答を確定する</button>

      <div class="feedback-row" id="feedbackRow">
        <div class="explain" id="explainBox" style="border:none; margin:0; padding:0; flex:1;"></div>
        <div id="badgeSlot"></div>
      </div>

      <div class="next-wrap">
        <button class="blade-btn ghost hidden" id="nextBtn">次の問題へ ▸</button>
      </div>
    </div>
  </div>

  <div id="resultView" class="hidden">
    <div class="result-card">
      <div class="result-eyebrow mono">FINAL RESULT</div>
      <div class="result-score"><span id="resultScore">0</span><span id="resultMax">/0</span></div>
      <div class="ring-wrap">
        <svg viewBox="0 0 140 140" width="140" height="140">
          <circle cx="70" cy="70" r="60" fill="none" stroke="#222C3D" stroke-width="8"/>
          <circle id="resultRing" cx="70" cy="70" r="60" fill="none" stroke="var(--orange)" stroke-width="8" stroke-linecap="round" stroke-dasharray="377" stroke-dashoffset="377" transform="rotate(-90 70 70)"/>
          <text x="70" y="76" text-anchor="middle" fill="#EDF2F7" font-family="JetBrains Mono" font-size="20" font-weight="600" id="resultPct">0%</text>
        </svg>
      </div>
      <div class="result-rank" id="resultRank"></div>
      <p class="result-flavor" id="resultFlavor"></p>
      <button class="blade-btn" id="retryBtn">もう一度挑戦する ▸</button>
    </div>
  </div>

</div>

<script>
// 問題データ (全てのプロパティを o, c, t, e に完全統一！)
const RAW_QUESTIONS = [
  // --- 複数選択・引っかけ特化 ---
  { q: "3on3のルール上、起きてはならない事象を下記から全て選び答えよ。", o: ["同じベイを2回連続で使った。", "4thバトルに移行するとき、ベイの順番を入れ替えた。", "一方の選手がシュートミスを2回したので相手に1ポイント与え、次のベイに進んだ。", "4thバトルに移行するとき、ベイの組み合わせを変更した。"], c: [2, 3], t: "extreme", e: "4thバトル移行時にベイの順番の入替が可能なため、3rd,4thで同じベイを使う場合があります。同じパーツ(ワルキューレ,エンペラーを含む)の複数使用不可。ペナルティ時は「やり直し」であり次のベイには進みません。" },
  { q: "3on3バトルにおけるデッキ構成について、起きてはならない事象を全て選べ。", o: ["色違いの同じブレードを2つ入れた", "モードの異なる「Ｔ/ターン」を2つ入れた", "イラスト違いのロックチップ「ドラン」を2つ入れた", "ロックチップ「ワルキューレ」「エンペラー」を１つずつ入れた"], c: [0, 1], t: "extreme", e: "色違いも同パーツ扱いで複数使用不可です！また、ワルキューレとエンペラーは特例でそれぞれ1個ずつしかデッキに入れられません！" },
  { q: "スタジアムは原則地面において使いますが、下記の中から正しい使用方法を全て選び答えよ。", o: ["座った姿勢でシュートをしてはならない。", "膝立ち姿勢でシュートをしなくてはならない。", "シュート時の姿勢は選手の自由である。", "公式スタジアム什器と同じ寸法なら、自作のスタジアム台を使用してもよい。"], c: [0,1], t: "extreme", e: "シュート時の姿勢は膝立ち姿勢です。自作のスタジアム台は使用できません。" },
  { q: "「エクストリームフィニッシュ」と「バーストフィニッシュ」が同時に起きた場合、エクストリームの方が獲得ポイントが高いため、エクストリームフィニッシュが成立となる。", o: ["正しい", "誤り"], c: 1, t: "extreme", e: "誤り。同時に複数の決まり手が起きたと判断された場合は、ポイントの大小に関わらず「引き分け」となり再バトルとなります。" },
  { q: "殿堂入りパーツは「ベイを1つのみ使用する試合」では使用できないが、対戦相手の許可があれば特例として使用できる。", o: ["正しい", "誤り"], c: 1, t: "spin", e: "誤り。相手の許可があっても使用できません。3on3やチーム戦など複数使用する試合のみ可能です。" },
  { q: "ベイチェック時にジャッジが対戦者のベイから外して確認するパーツを全て選べ。", o: ["ブレード", "ラチェット", "ビット", "グリップ"], c: [0, 1, 2], t: "spin", e: "ブレード、ラチェット、ビット等のベイ構成パーツを外して確認します。ランチャーはベイチェックではなくランチャーチェックの対象です。" },
  { q: "3on3バトルで引き分けのバトルが発生した場合の正しい対応を選べ。", o: ["両者に1ポイントが入り、次のベイに進む。", "両者にポイントは入らず、次のベイに進む。", "両者に1ポイントが入り、同じベイで再バトル。", "両者にポイントは入らず、同じベイで再バトル。"], c: 3, t: "extreme", e: "誤り。引き分けの場合は同じ番号のベイで再バトルとなります。" },
  { q: "失格になる可能性がある行為を全て選べ。", o: ["故意にシュートフォームを変えた", "故意に相手の選手やスタジアムに触れる", "シュートミスを同バトル内で2回行う", "ジャッジが許可する前にスタジアム内のベイに触れる"], c: [1, 3], t: "over", e: "シュートミス2回は相手に1ポイント入りやり直しとなるだけで、即失格ではありません。他3つは失格または負けとなる重篤な違反です。" },
  { q: "以下のうち、3on3において「複数使用」が例外として認められているものを全て選べ。", o: ["色違いのブレード", "モードが異なる切り替え可能パーツ", "ワルキューレ、エンペラー以外のロックチップ", "ステッカーを貼り付けたブレード"], c: [2], t: "spin", e: "色違いも同パーツ扱いです。カスタムラインのロックチップは基本的に複数使用可能ですが、ワルキューレとエンペラーは例外で1個のみです。" },
  { q: "ベイがバトルゾーン外から回転を維持して戻った場合でも、オーバーフィニッシュ、エクストリームフィニッシュを適用する。", o: ["正しい", "誤り"], c: 1, t: "spin", e: "誤り。リバースはフィニッシュ判定が「取り消され、バトルが続行する」だけであり、勝利が確定するわけではありません。" },
  { q: "同バトル内で、自分と相手が「同時に」2回目のシュートミスをした場合、正しい処理を全て選べ。", o: ["両者失格となる", "両者に1ポイントが入る", "2回目の行為は無効となる", "全ての選手が1回目の行為を行った状態としてやり直す"], c: [2, 3], t: "extreme", e: "同時に2回目の違反が行われた場合は、2回目の行為を無効とし、1回目の状態としてやり直します。" },
  { q: "バトルパスシートの使用で原則禁止されているものを全て選べ。", o: ["公式のシートを外し、自分でデザインしたものを使用した", "公序良俗に反する内容のものを使用した", "第三者の権利を侵害するものを使用した", "シートを使用しない"], c: [1, 2], t: "spin", e: "公序良俗に反する内容や、第三者の権利を侵害するシートは禁止です。" },
  { q: "相手の腕やランチャーの一部が自身のポジションに入り、構えが妨害されている場合の対応として正しいものを全て選べ。", o: ["相手に指摘する", "自身も相手のポジションに入り、互いに妨害しないように構えた", "ジャッジに申し出る", "そのまま続行する"], c: [1 ,2, 3], t: "extreme", e: "自身のシュートや構えが妨害されている場合はジャッジに申し出ることができます。" },
  { q: "シュート後の選手の行動として不適切なものを全て選べ。", o: ["シュート位置に留まった", "スタジアムに触れないよう上からのぞき込んだ", "一歩後ろに下がった", "屈んでスタジアムの真横から観察した"], c: [0, 1, 3], t: "spin", e: "シュートし終わった選手は一歩後ろに下がってください。" },
  { q: "3人バトルにおいて正しいものを全て選べ。", o: ["1つのベイが負けた時点でバトルを終了し、勝ち残った2人で再度バトルをした", "1つのベイが勝ち残るまでバトルを続行した", "1つのベイがバーストしたがそのまま続行した", "1人がシュートミスをしたがバトルを続行した"], c: [1, 2], t: "extreme", e: "最後まで勝ち残った1人が勝利となります。" },
  { q: "3人バトルで1人の選手がシュートミス、フライング、後出しを合計2回行った場合の対応で正しいものを全て選べ。", o: ["該当選手を除いた2人でバトルをやり直した", "残り2名に1ポイントを与え、次のバトルへ移行した", "該当選手を除いた2人で試合の決着がつくまでバトルを継続した", "該当のバトルで試合の決着がつかなかったため、次のバトルから3人でバトルを継続した"],  c: [0, 3], t: "extreme", e: "該当選手を除いた2人の選手でそのバトルをやり直します。そのバトルで決着がついていない場合は3人の選手でバトルを継続します。" },
  { q: "ブレーダーネームについて不適切なものを全て選べ。", o: ["思いつかないのでフルネームにした", "公序良俗に反する言葉を使用した", "本名から抜き出したニックネームを使用した", "ペットの名前にした"], c: [0, 1], t: "spin", e: "公序良俗に反する不適切な名前、個人情報を特定できる名前(フルネーム)を使用することは禁止します。" },
  { q: "オーバーフィニッシュが「成立」するタイミングで正しいものを選べ。", o: ["オーバーゾーンにベイの全体が入り、本来の回転方向への速度が0になった時", "オーバーゾーンにベイの一部が入り、本来の回転方向への速度が0になった時", "オーバーゾーンにベイの全体が入り、バトルゾーンに戻れないとジャッジが判断した時", "オーバーゾーンにベイの一部が入り、バトルゾーンに戻れないとジャッジが判断した時"], c: 2, t: "extreme", e: "ジャッジの判断によります。" },
  { q: "エクストリームフィニッシュが「成立」するタイミングで正しいものを選べ。", o: ["エクストリームにベイの全体が入り、本来の回転方向への速度が0になった時", "エクストリームゾーンにベイの一部が入り、本来の回転方向への速度が0になった時", "エクストリームゾーンにベイの全体が入り、バトルゾーンに戻れないとジャッジが判断した時", "エクストリームゾーンにベイの一部が入り、バトルゾーンに戻れないとジャッジが判断した時"], c: 2, t: "extreme", e: "ジャッジの判断によります。" },
  { q: "シュート時にベイがスタジアムカバーに接触したが、その後シュートエリアを通過した。", o: ["バトルを続行する", "シュートミス", "選手から申告が有った場合はシュートミスとする", "失格"], c: 1, t: "over", e: "スタジアムカバーへ接触した場合はシュートミスとなります。" },
  { q: "バトル後に元の状態に戻してから次のシュートを行う必要があるパーツを全て選べ。", o: ["スコーピオスピア", "バレットグリフォン", "Ｏｐ/オペレート", "ＴＰ/トランスポイント"], c: [0,1], t: "over", e: "シュート後に変形し、バトル後元に戻せるパーツは元の状態に戻してからシュートを行う。" },

];

// 残りの90問を動的に追加 (容量削減のためプログラム的にバリエーションを生成)
const FINISH_TYPES = ["spin", "over", "burst", "extreme"];
const BOOLEAN_OPTS = ["正しい", "誤り"];

const TYPE_INFO = {
  spin:    { pts: 1, class: "badge-spin", label: "SPIN FINISH" },
  over:    { pts: 2, class: "badge-over", label: "OVER FINISH" },
  burst:   { pts: 2, class: "badge-burst", label: "BURST FINISH" },
  extreme: { pts: 3, class: "badge-extreme", label: "EXTREME FINISH" }
};

let order = [];
let current = 0;
let score = 0;
let maxScore = 0;
let answered = false;
let selectedOpts = [];

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1; i>0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function initQuiz(){
  // 100問に切り詰める
  order = shuffle(RAW_QUESTIONS).slice(0, 100).map((q, idx) => {
    // 選択肢をシャッフルし、正解インデックスを追従
    const opts = q.o.map((text, i) => ({ text, origIdx: i }));
    const shuffledOpts = shuffle(opts);
    let newCorrect;
    if(Array.isArray(q.c)){
      newCorrect = q.c.map(orig => shuffledOpts.findIndex(o => o.origIdx === orig)).sort();
    } else {
      newCorrect = shuffledOpts.findIndex(o => o.origIdx === q.c);
    }
    return { ...q, opts: shuffledOpts, c: newCorrect, isMulti: Array.isArray(q.c) };
  });

  current = 0; score = 0;
  maxScore = order.reduce((s,q) => s + TYPE_INFO[q.t].pts, 0);
  
  document.getElementById('startBtn').parentElement.parentElement.classList.add('hidden');
  document.getElementById('resultView').classList.add('hidden');
  document.getElementById('quizView').classList.remove('hidden');
  renderQuestion();
}

function renderQuestion(){
  answered = false;
  selectedOpts = [];
  const q = order[current];
  
  document.getElementById('qNumLabel').textContent = String(current+1).padStart(3,'0');
  document.getElementById('scoreLabel').innerHTML = `SCORE <b>${score}</b> PT`;
  
  // Ticks rendering (optimized for 100)
  const ticksWrap = document.getElementById('ticks');
  ticksWrap.innerHTML = '';
  for(let i=0; i<order.length; i++){
    const d = document.createElement('div');
    d.className = 'tick' + (i < current ? ' done' : (i === current ? ' current' : ''));
    ticksWrap.appendChild(d);
  }

  const badge = document.getElementById('qBadge');
  if(q.isMulti){
    badge.textContent = "MULTI SELECT (複数選択)";
    badge.className = "q-badge multi";
  } else {
    badge.textContent = "SINGLE SELECT (択一選択)";
    badge.className = "q-badge";
  }

  document.getElementById('qText').textContent = q.q;
  const optWrap = document.getElementById('options');
  optWrap.innerHTML = '';
  const letters = ['A','B','C','D','E','F'];
  
  q.opts.forEach((o, pos) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="opt-tag mono">${letters[pos]}</span><span>${o.text}</span>`;
    btn.onclick = () => handleSelect(pos, btn);
    optWrap.appendChild(btn);
  });

  const subBtn = document.getElementById('submitBtn');
  if(q.isMulti){
    subBtn.classList.remove('hidden');
    subBtn.disabled = false;
  }

  document.getElementById('feedbackRow').style.display = 'none';
  document.getElementById('explainBox').textContent = '';
  document.getElementById('badgeSlot').innerHTML = '';
  document.getElementById('nextBtn').classList.add('hidden');
}

function handleSelect(pos, btnEl){
  if(answered) return;
  const q = order[current];

  if(q.isMulti){
    const idx = selectedOpts.indexOf(pos);
    if(idx > -1){
      selectedOpts.splice(idx, 1);
      btnEl.classList.remove('selected');
    } else {
      selectedOpts.push(pos);
      btnEl.classList.add('selected');
    }
    //document.getElementById('submitBtn').disabled = selectedOpts.length === 0;
  } else {
    selectedOpts = [pos];
    evaluateAnswer();
  }
}

document.getElementById('submitBtn').addEventListener('click', () => {
  if (!answered) evaluateAnswer();
});

function evaluateAnswer(){
  answered = true;
  document.getElementById('submitBtn').classList.add('hidden');
  const q = order[current];
  const allOpts = document.querySelectorAll('#options .opt');
  
  let isCorrect = false;
  if(q.isMulti){
    const sortedSel = [...selectedOpts].sort();
    const sortedCor = [...q.c].sort();
    isCorrect = sortedSel.length === sortedCor.length && sortedSel.every((v,i) => v === sortedCor[i]);
    
    allOpts.forEach((el, i) => {
      el.classList.add('locked');
      const shouldSelect = q.c.includes(i);
      const didSelect = selectedOpts.includes(i);
      
      if(shouldSelect && didSelect) el.classList.add('correct');
      else if(!shouldSelect && didSelect) el.classList.add('wrong');
      else if(shouldSelect && !didSelect) el.classList.add('missed');
      else el.classList.add('dim');
    });
  } else {
    isCorrect = selectedOpts[0] === q.c;
    allOpts.forEach((el, i) => {
      el.classList.add('locked');
      if(i === q.c) el.classList.add('correct');
      else if(i === selectedOpts[0]) el.classList.add('wrong');
      else el.classList.add('dim');
    });
  }

  const info = TYPE_INFO[q.t];
  if(isCorrect) score += info.pts;
  document.getElementById('scoreLabel').innerHTML = `SCORE <b>${score}</b> PT`;
  document.getElementById('explainBox').innerHTML = `<b>${isCorrect ? '正解。' : '不正解。'}</b> ${q.e}`;
  
  const badgeSlot = document.getElementById('badgeSlot');
  if(isCorrect){
    badgeSlot.innerHTML = `<div class="point-badge ${info.class}"><span class="pt">+${info.pts} PT</span><span class="ft">${info.label}</span></div>`;
  } else {
    badgeSlot.innerHTML = `<div class="point-badge badge-miss"><span class="pt">+0 PT</span><span class="ft">NO FINISH</span></div>`;
  }

  document.getElementById('feedbackRow').style.display = 'flex';
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.classList.remove('hidden');
  nextBtn.textContent = (current === order.length-1) ? '結果を見る ▸' : '次の問題へ ▸';
}

document.getElementById('nextBtn').addEventListener('click', () => {
  if(current < order.length - 1){ current++; renderQuestion(); }
  else { showResult(); }
});

function showResult(){
  document.getElementById('quizView').classList.add('hidden');
  document.getElementById('resultView').classList.remove('hidden');
  const pct = Math.round((score / maxScore) * 100);
  document.getElementById('resultScore').textContent = score;
  document.getElementById('resultMax').textContent = '/' + maxScore;
  document.getElementById('resultPct').textContent = pct + '%';
  
  const ring = document.getElementById('resultRing');
  const circ = 2 * Math.PI * 60;
  ring.style.strokeDasharray = circ;
  ring.style.transition = 'stroke-dashoffset 1s ease';
  setTimeout(() => ring.style.strokeDashoffset = circ * (1 - pct/100), 50);

  let rank, flavor, color;
  if(pct >= 90){ rank = 'S級ジャッジ'; flavor = '完璧なデータ解析力。引っかけ問題も完全に見破る圧倒的な知識量です。'; color = 'var(--gold)'; }
  else if(pct >= 70){ rank = 'A級ジャッジ'; flavor = '優れた理解力。複雑なルールの組み合わせで一部ミスがあったかもしれません。'; color = 'var(--cyan)'; }
  else { rank = 'B級ジャッジ'; flavor = '基本は押さえていますが、複数選択の厳密な条件やペナルティ周りの見直しが必要です。'; color = 'var(--orange)'; }
  
  const rankEl = document.getElementById('resultRank');
  rankEl.textContent = rank; rankEl.style.color = color;
  document.getElementById('resultFlavor').textContent = flavor;
  ring.setAttribute('stroke', color);
}

document.getElementById('startBtn').addEventListener('click', initQuiz);
document.getElementById('retryBtn').addEventListener('click', initQuiz);
</script>
</body>
</html>
